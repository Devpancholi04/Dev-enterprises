<!DOCTYPE html>
<html>
<head>
  <style>
    /* Style the button */
    .btn {
      background-color: #4CAF50; /* Green background */
      border: none; /* Remove borders */
      color: white; /* White text */
      padding: 12px 16px; /* Some padding */
      font-size: 16px; /* Set a font size */
      cursor: pointer; /* Mouse pointer on hover */
    }

    /* Style the dropdown container */
    .dropdown {
      position: relative; /* Position the dropdown container */
      display: inline-block; /* Make the container smaller than the content (width and height) */
    }

    /* Style the dropdown menu (hidden by default) */
    .dropdown-content {
      display: none; /* Hide the dropdown menu by default */
      position: absolute; /* Position the dropdown menu */
      background-color: #f9f9f9; /* White background color */
      min-width: 160px; /* Minimum width of the dropdown container */
      box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); /* Add some shadows */
      z-index: 1; /* Make sure the dropdown menu is on top of other elements */
    }

    /* Style the links inside the dropdown menu */
    .dropdown-content a {
      color: black; /* Black text color */
      padding: 12px 16px; /* Some padding */
      text-decoration: none; /* Remove underline from links */
      display: block; /* Make the links appear below each other */
    }

    /* Change color of links on hover */
    .dropdown-content a:hover {
      background-color: #ddd; /* Change background color on hover */
    }

    /* Show the dropdown menu when the user clicks on the button */
    .show {
      display: block;
    }
  </style>
</head>
<body>

<h2>Dropdown Menu with Icons</h2>
<p>Click on the button to show the dropdown menu.</p>

<div class="dropdown">
  <!-- Use any element to open/show the dropdown menu, e.g. a button -->
  <button onclick="showDropdown()" class="btn"><i class="fa fa-bars"></i></button>
  <!-- Add Font Awesome icons inside the button -->
  
  <!-- Dropdown content (hidden by default) -->
  <div id="myDropdown" class="dropdown-content">
    <!-- Add links to your dropdown menu -->
    <a href="#"><i class="fa fa-home"></i> Home</a>
    <a href="#"><i class="fa fa-user"></i> Profile</a>
    <a href="#"><i class="fa fa-envelope"></i> Contact</a>
  </div>
</div>

<!-- Load Font Awesome Icon Library -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<script>
// Get the button that opens the dropdown
var btn = document.getElementsByClassName("btn")[0];

// Get the dropdown content
var dropdown = document.getElementById("myDropdown");

// Toggle between showing and hiding the dropdown content when the user clicks on the button
function showDropdown() {
  if (dropdown.classList.contains('show')) {
    // If the dropdown is shown, hide it
    dropdown.classList.remove('show');
  } else {
    // If the dropdown is hidden, show it
    dropdown.classList.add('show');
  }
}

// Close the dropdown if the user clicks outside of it
window.onclick = function(event) {
  if (!event.target.matches('.btn')) {
    // If the user clicks anywhere except the button, hide the dropdown
    if (dropdown.classList.contains('show')) {
      dropdown.classList.remove('show');
    }
  }
}
</script>

</body>
</html>
